<Directory "/var/www/html">
    ###########################################################################################
    ### Apache Core Features
    ###########################################################################################

        ## ServerSignature Directive
        #################################################
        ServerSignature Off

        ## Options Directive
        #################################################
        Options                     -ExecCGI +FollowSymLinks -Includes -IncludesNOEXEC -Indexes -Multiviews -SymLinksIfOwnerMatch

        ## FileETag Directive
        #################################################
        FileETag None

        ## AddDefaultCharset Directive
        ##  Note: Default charset parameter to be added
        ##  when a response content-type is text/plain or
        ##  text/html
        #################################################
        AddDefaultCharset utf-8

    ###########################################################################################
    ### Apache Module mod_dir
    ###########################################################################################

        ## DirectorySlash Directive
        #################################################
        DirectorySlash Off

    ###########################################################################################
    ### Apache Module mod_mime
    ###########################################################################################

        ## Add mime type
        #################################################
        # Text
        AddType text/plain                        .txt
        AddType text/html                        .htm .html .htmls .shtml .dhtml
        AddType text/css                        .css
        AddType text/xml                        .xml
        AddType    text/xsl                        .xslt .xsl
        AddType text/x-vcard                    .vcf
        AddType text/cache-manifest                .manifest

        # Image
        AddType image/gif                        .gif
        AddType image/png                        .png
        AddType image/jpeg                        .jpg .jpeg
        AddType image/x-icon                    .ico .icon
        AddType    image/tiff                        .tif .tiff
        AddType    image/svg+xml                    .svg

        # Video
        AddType video/mp4                        .mp4
        AddType video/ogg                        .ogv
        AddType video/webm                        .webm

        # Application
        AddType application/vnd.ms-excel        .xls
        AddType application/javascript            .js
        AddType application/pdf                    .pdf
        AddType    application/gzip                .gz .gzip
        AddType application/x-httpd-php-source    .phps
        AddType application/rss+xml                .rss
        AddType application/rdf+xml                .rdf
        AddType application/json                .json
        AddType    application/xhtml+xml            .xhtml

        # Fonts
        AddType application/x-font-ttf          .ttc .ttf
        AddType application/x-font-otf          .otf
        AddType application/font-woff           .woff
        AddType application/font-woff2          .woff2
        AddType application/vnd.ms-fontobject   .eot

        # Application (Force download)
        AddType application/octet-stream        .zip
        AddType application/octet-stream        .rar

    ###########################################################################################
    ### Apache Module mod_deflate
    ###########################################################################################
        <ifModule mod_deflate.c>
            <ifModule mod_setenvif.c>
                ## Enabling Compression
                ##  Note: If an Accept-Encoding header is present,
                ##  mod_deflate will compress the content
                #################################################
                SetOutputFilter DEFLATE
                SetEnvIfNoCase Accept-Encoding (gzip|deflate) doAgent # doAgent for later use

                ## Setings
                #################################################
                SetEnvIfNoCase request_uri \.(php|htm|html|htmls|shtml|dhtml|xml|css|rss|json|rdf)$ gzip=9 cache-enable=mem
                SetEnvIfNoCase request_uri \.(txt|xslt|xsl|vcf|manifest|js|phps|xhtml)$ gzip=6

                ## Excludes
                #################################################
                SetEnvIfNoCase request_uri "\.(icon?|svg|jpe?g|png|gif|tiff?|xls|gzip|gz|pdf|exe|zip|rar)$" no-gzip dont-vary
            </ifModule>
        </ifModule>

    ###########################################################################################
    ### Apache Module mod_expires
    ###########################################################################################
        <ifModule mod_expires.c>
            ## ExpiresActive Directive
            #################################################
            ExpiresActive On

            ##
            #################################################
            ExpiresDefault                               A0

            # Text
            ExpiresByType text/plain                     A31104000
            ExpiresByType text/css                       A31104000
            ExpiresByType text/xml                       A216000
            ExpiresByType text/xsl                       A216000
            ExpiresByType text/x-vcard                   A216000

            # image
            ExpiresByType image/gif                      A31104000
            ExpiresByType image/png                      A31104000
            ExpiresByType image/jpeg                     A31104000
            ExpiresByType image/x-icon                   A31104000
            ExpiresByType image/tiff                     A31104000
            ExpiresByType image/svg+xml                  A31104000

            # application
            ExpiresByType application/vnd.ms-excel       A31104000
            ExpiresByType application/javascript         A31104000
            ExpiresByType application/pdf                A31104000
            ExpiresByType application/gzip               A31104000
            ExpiresByType application/x-httpd-php-source A216000
            ExpiresByType application/rss+xml            A216000
            ExpiresByType application/rdf+xml            A216000
            ExpiresByType application/json               A216000
            ExpiresByType application/xhtml+xml          A216000

            # Fonts
            ExpiresByType application/x-font-ttf         A31104000
            ExpiresByType application/x-font-otf         A31104000
            ExpiresByType application/font-woff          A31104000
            ExpiresByType application/font-woff2         A31104000
            ExpiresByType application/vnd.ms-fontobject  A31104000
        </ifModule>

    ###########################################################################################
    ### Apache Module mod_headers
    ###########################################################################################
        <ifModule mod_headers.c>
            <ifModule mod_setenvif.c>
                ## Remove headers
                #################################################
                Header unset Server
                Header unset Accept-Ranges
                Header unset Pragma
                Header unset ETag
                Header unset X-Powered-By

                ## Make sure proxies don't deliver the wrong content
                #################################################
                Header set Vary Accept-Encoding
                Header append Vary User-Agent env=doAgent
                Header unset Vary env=dont-vary

                ## Security
                #################################################
                Header always set X-XSS-Protection "1; mode=block"
                Header always set X-Frame-Options "SAMEORIGIN"
                Header always set X-Content-Type-Options "nosniff"
                Header always set Strict-Transport-Security "max-age=31536000"

                ## Internet Explorer ::: https://stackoverflow.com/a/6771584/678611
                #################################################
                BrowserMatch MSIE ie
                SetEnvIfNoCase request_uri \.(?!htm|html|htmls|shtml|dhtml)$ !ie
                Header set X-UA-Compatible "IE=Edge,chrome=1" env=ie

                ## Browser Cache control
                #################################################
                SetEnvIfNoCase request_uri \.(txt|css|icon?|jpe?g|gif|png|tiff?|svg|xls|js|pdf|gz|gzip|ttc|ttf|otf|woff|woff2|eot)$ cache
                Header set Cache-Control "max-age=31104000, public" env=cache

                SetEnvIfNoCase request_uri \.(xml|xsl|xslt|vcf|phps|rss|rdf|json|xhtml)$ cache
                Header set Cache-Control "max-age=216000, public" env=cache

                Header set Cache-Control "max-age=0, private, must-revalidate, post-check=0, pre-check=0" env=!cache
            </ifModule>
        </ifModule>

    ################################################################################################################################
    ### Php options
    ################################################################################################################################
        <FilesMatch "\.php">
            <IfModule mod_php5.c>
                ## Log
                #################################################
                    # -1 all or 1 for only fatal errors
                php_value error_reporting 1
                php_flag display_startup_errors off
                php_flag display_errors off
                php_flag html_errors off
                php_flag log_errors on
                php_flag ignore_repeated_errors off
                php_flag ignore_repeated_source off
                php_flag report_memleaks off
                php_flag track_errors off

                ##
                #################################################
                php_value max_execution_time 120
                php_value max_input_time 120
                php_value post_max_size 10M
                php_value upload_max_filesize 10M

                ##
                #################################################
                php_value session.auto_start 0
                php_value output_buffering 0
                php_value memory_limit 256M
            </IfModule>
        </FilesMatch>

    ################################################################################################################################
    ### Security
    ################################################################################################################################

        <Files ".*">
            order allow,deny
            deny from all
        </Files>
        <Files "*.ini">
            order allow,deny
            deny from all
        </Files>
        <Files "*.log">
            order allow,deny
            deny from all
        </Files>
        <Files "*.exe">
            order allow,deny
            deny from all
        </Files>

    ###########################################################################################
    ### Mod rewriting
    ###########################################################################################

        ##
        #################################################
        RewriteEngine On
        RewriteOptions MaxRedirects=10
        RewriteBase /

        RewriteCond %{HTTP_HOST} ([^\.]+\.[^\.]+)$ [OR]
        RewriteCond %{HTTP_HOST} ^(localhost)$     [NC]
        RewriteRule ^            -                 [E=DOMAINE:%1]

        ## Set default protocol and remove subdomains
        #################################################
        RewriteCond %{HTTPS}     on                       [OR]
        RewriteCond %{HTTP_HOST} !^%{ENV:DOMAINE}$
        RewriteRule (.*)         http://%{ENV:DOMAINE}/$1 [L,R=301]

        ## Select gone
        #################################################
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteRule ^.*\.(css|xml|icon?|jpe?g|gif|png|tiff?|svg|mp4|ogv|webm|js|xhtml|json|ttc|ttf|otf|woff|woff2|eot)$ - [L,R=410,NC]

        ## Static content
        #################################################
        RewriteCond %{REQUEST_FILENAME} -f
        RewriteRule ^                   -  [L]

        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteRule ^                   index.php [QSA,L]

</Directory>
